<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Countdown</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      padding: 32px;
      max-width: 900px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 24px;
    }

    .main {
      font-size: 2.4rem;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .sub {
      font-size: 1.3rem;
      margin: 10px 0;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>♥ time left until meeting my love ♥</h1>
    <div class="main" id="mainTime">Loading...</div>
    <div class="sub" id="totalMinutes"></div>
    <div class="sub" id="totalSeconds"></div>
  </div>

  <script>
    const targetDate = new Date("2026-04-27T20:10:00Z");

    function updateCountdown() {
      const now = new Date();
      const diffMs = targetDate - now;

      if (diffMs <= 0) {
        document.getElementById("mainTime").textContent =
          "0 days 0 h 0 min 0 sec";
        document.getElementById("totalMinutes").textContent =
          "minutes left: 0";
        document.getElementById("totalSeconds").textContent =
          "seconds left: 0";
        return;
      }

      const totalSeconds = Math.floor(diffMs / 1000);
      const totalMinutes = Math.floor(totalSeconds / 60);

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("mainTime").textContent =
        `${days} days ${hours} h ${minutes} min ${seconds} sec`;

      document.getElementById("totalMinutes").textContent =
        `minutes left: ${totalMinutes}`;

      document.getElementById("totalSeconds").textContent =
        `seconds left: ${totalSeconds}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
